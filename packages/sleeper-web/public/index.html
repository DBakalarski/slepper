<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover dla iPhone notch / safe-area-inset -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>%WEB_TITLE%</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect do Supabase — DNS+TLS+TCP handshake startuje rownolegle z
         parsowaniem bundla, zamiast dopiero przy pierwszym auth-request po
         hydracji. crossorigin: requesty auth/rest sa CORS. -->
    <link rel="preconnect" href="https://qcyklmrotbkehgpjdebl.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://qcyklmrotbkehgpjdebl.supabase.co" />

    <!-- Theme color — browser chrome tint (Chrome Android, Edge, Safari 15+) -->
    <meta name="theme-color" content="#1E1B4B" />
    <meta name="theme-color" content="#0F0F1A" media="(prefers-color-scheme: dark)" />

    <!-- iOS Safari PWA — standalone mode (full-screen, bez Safari chrome) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- default: status bar nieprzezroczysty, webview startuje POD nim. black-translucent
         powodowal ze iOS standalone PWA startuje z przycietym webview (812px zamiast 874px
         na 16 Pro) -> 62px kremowego pasa pod tab barem; naprawialo sie dopiero po reload. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sleeper" />

    <!-- iOS home screen icon (Add to Home Screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />

    <!-- SEO + social (minimum) -->
    <meta name="description" content="Trackuj sen i okna aktywnosci dziecka. Synchronizacja miedzy urzadzeniami." />

    <!-- The `react-native-web` recommended style reset -->
    <style id="expo-reset">
      /* These styles make the body full-height. 100dvh = dynamic viewport,
         iOS PWA standalone uwzglednia iOS home bar; fallback 100% dla starszych przegladarek. */
      html,
      body {
        height: 100%;
        height: 100dvh;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        /* Cream tla — eliminuje bialy flash przed React render (anti-FOWT body bg) */
        background-color: #F5F0E8;
      }
      @media (prefers-color-scheme: dark) {
        body {
          /* Anti-FOWT dark bg, matchuje shell (#0F0D26) — bez bialego flasha przed React render. */
          background-color: #0F0D26;
        }
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        height: 100dvh;
        flex: 1;
      }
      /* iOS PWA home-indicator safe-area dla tab baru obsluguje react-navigation
         natywnie (getTabBarHeight = TABBAR_HEIGHT + insets.bottom; outer container
         dostaje paddingBottom: insets.bottom). safe-area-context@5 mierzy env() na
         web poprawnie. NIE dodawac tu CSS targetujacego wewnetrzny rzad przyciskow
         tab baru z env(safe-area-inset) — dubluje inset i zostawia pusty pas pod
         ikonami (regresja wracala 3x; guard w features/pwa/__tests__). */

      /* Branded splash — widoczny NATYCHMIAST (T0), zanim 2.5 MB bundla JS sie
         sparsuje (~1-2 s na telefonie). React (createRoot) zastepuje zawartosc
         #root przy montazu -> splash znika bezszwowo, bo komponent <AppLoader>
         (auth status==='loading') wyglada identycznie. "Oddychajacy ksiezyc" =
         spokojny, pasuje do appki o snie (nie nerwowy spinner). */
      #app-splash {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }
      #app-splash .splash-moon {
        color: #1E1B4B;
        animation: splash-breathe 1.8s ease-in-out infinite;
      }
      #app-splash .splash-name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #1E1B4B;
        opacity: 0.85;
      }
      @media (prefers-color-scheme: dark) {
        #app-splash .splash-moon,
        #app-splash .splash-name {
          color: #F5F0E8;
        }
      }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); opacity: 0.55; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-moon {
          animation: none;
          opacity: 0.9;
        }
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root">
      <!-- Inline splash — renderuje sie z samego HTML+CSS (zero JS), wiec jest
           widoczny od pierwszej klatki. React zastepuje go przy montazu. -->
      <div id="app-splash" aria-hidden="true">
        <div class="splash-moon">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
        </div>
        <div class="splash-name">Sleeper</div>
      </div>
    </div>
  </body>
</html>
